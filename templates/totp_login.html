<!DOCTYPE html>
<html>
<head>
<title>Two-Factor Login — SecureJobs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-xl p-8 text-center w-96">
  <h2 class="text-2xl font-bold text-blue-700 mb-2">Two-Factor Verification</h2>
  <p class="text-gray-500 text-sm mb-6">
    Open your authenticator app and enter the current 6-digit code.
  </p>

  <form method="post" action="/totp-login/{{ email }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <input name="otp" placeholder="6-digit code" maxlength="6"
           class="border p-3 rounded-lg w-full mb-4 text-center tracking-widest text-xl
                  focus:ring-2 focus:ring-blue-500 outline-none">

    <button class="bg-blue-600 text-white px-6 py-2 rounded-lg w-full
                   font-semibold hover:bg-blue-700">
      Verify &amp; Login
    </button>
  </form>
</div>

</body>
</html>
