<!DOCTYPE html>
<html>
<head>
<title>SecureJobs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-white shadow-md p-4 flex justify-between px-8">
  <div class="text-2xl font-bold text-blue-700">
    Secure<span class="text-orange-500">Jobs</span>
  </div>

  <div>
    {% if user %}
      <a href="/profile" class="mr-4 text-blue-600">Profile</a>

      {% if user.is_admin %}
        <a href="/admin" class="mr-4 text-purple-600">Admin</a>
      {% endif %}

      <a href="/logout" class="text-red-600">Logout</a>
    {% else %}
      <a href="/login" class="mr-4 text-blue-600">Login</a>
      <a href="/register" class="bg-blue-600 text-white px-4 py-2 rounded">Register</a>
    {% endif %}
  </div>
</nav>

<div class="flex items-center justify-center mt-32">
  <div class="text-center">
    <h1 class="text-5xl font-bold text-blue-700 mb-6">
      Find Your Dream Job Securely
    </h1>
    <p class="text-gray-600 text-lg">
      Secure Authentication · TOTP Verification · Encrypted Resume Upload
    </p>
  </div>
</div>

</body>
</html>
