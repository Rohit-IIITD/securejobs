<!DOCTYPE html>
<html>
<head>
<title>Register — SecureJobs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-xl w-full max-w-md p-8">
  <h2 class="text-3xl font-bold text-center text-blue-700 mb-6">Create Account</h2>

  {% if request.query_params.get("error") == "email_taken" %}
    <p class="text-red-600 text-sm text-center mb-4">❌ That email is already registered.</p>
  {% endif %}

  <form id="register-form" method="post" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <input name="full_name" placeholder="Full Name" required
           class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    <input name="email" type="email" placeholder="Email" required
           class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    <input name="phone" placeholder="Mobile Number"
           class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
    <input type="password" name="password" placeholder="Password" required
           class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Account Type</label>
      <select name="role"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        <option value="user">Job Seeker</option>
        <option value="recruiter">Recruiter</option>
      </select>
    </div>

    <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
      Register
    </button>
  </form>

  <p class="text-center text-sm mt-4">
    Already have an account?
    <a href="/login" class="text-blue-600 font-semibold">Login</a>
  </p>
</div>

<script>
  document.getElementById("register-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const form = e.target;
    const token = form.querySelector('input[name="csrf_token"]').value;
    const data = new FormData(form);

    fetch("/register", {
      method: "POST",
      headers: { "X-CSRF-Token": token },
      body: data
    }).then(res => {
      if (res.redirected) {
        window.location.href = res.url;
      } else {
        res.text().then(html => {
          document.open();
          document.write(html);
          document.close();
        });
      }
    });
  });
</script>

</body>
</html>
