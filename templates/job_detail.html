<!DOCTYPE html>
<html>
<head>
<title>{{ job.title }}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded-lg shadow">

  <h1 class="text-2xl font-bold">{{ job.title }}</h1>
  <p class="text-gray-600 mt-2">{{ job.location }}</p>

  <p class="mt-4">{{ job.description }}</p>
  {% if user %}
  <form method="post" action="/apply/{{ job.id }}" class="mt-6 space-y-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <textarea name="cover_note"
              placeholder="Write a short cover note..."
              class="w-full border p-3 rounded"></textarea>

    <button class="bg-green-600 text-white px-4 py-2 rounded">
      Apply Now
    </button>

  </form>
{% else %}
  <p class="mt-4 text-red-500">Login to apply</p>
{% endif %}

  <p class="mt-4 text-sm text-gray-500">
    Skills: {{ job.skills }}
  </p>

</div>

</body>
</html>
