<!DOCTYPE html>
<html>
<head>
<title>Verify Email — SecureJobs</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<script>
  document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();
    const form = e.target;
    const token = form.querySelector('input[name="csrf_token"]').value;
    const data = new FormData(form);
    data.delete("csrf_token");

    fetch(window.location.pathname, {
      method: "POST",
      headers: { "X-CSRF-Token": token },
      credentials: "include",
      body: data
    }).then(res => {
      if (res.redirected) {
        window.location.href = res.url;
      } else {
        res.text().then(html => {
          document.open(); document.write(html); document.close();
        });
      }
    });
  });
</script>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-xl p-8 text-center w-96">
  <h2 class="text-2xl font-bold text-blue-700 mb-2">Check Your Email</h2>
  <p class="text-gray-500 text-sm mb-6">
    We sent a 6-digit code to <strong>{{ email }}</strong>.<br>
    It expires in 10 minutes.
  </p>

  {% if request.query_params.get("error") == "invalid" %}
  <p class="text-red-600 text-sm mb-4">❌ Invalid or expired code. Try again.</p>
  {% endif %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <input name="code" placeholder="6-digit code" maxlength="6"
           class="border p-3 rounded-lg w-full mb-4 text-center tracking-widest text-xl
                  focus:ring-2 focus:ring-blue-500 outline-none">

    <button class="bg-blue-600 text-white px-6 py-2 rounded-lg w-full
                   font-semibold hover:bg-blue-700">
      Verify Email
    </button>
  </form>
</div>

</body>
</html>
