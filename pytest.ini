[pytest]
# ── Test discovery ────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output formatting ─────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── Markers ───────────────────────────────────────────────────
markers =
    unit:        Pure function tests (no DB, no HTTP)
    integration: Tests that exercise HTTP routes with a test DB
    security:    Tests that verify specific security controls
