# ─────────────────────────────────────────────────────────────
#  nginx.conf — SecureJobs
#  Full TLS + security-hardened reverse proxy configuration.
#
#  WHAT THIS FILE DOES (layer by layer):
#  ─────────────────────────────────────
#  1. HTTP (port 80)  → permanent 301 redirect to HTTPS.
#     No content is ever served over plain HTTP.
#
#  2. HTTPS (port 443) → TLS termination using your certificate,
#     then reverse-proxy to Uvicorn on localhost:8000.
#
#  3. TLS hardening:
#     - Only TLS 1.2 and 1.3 (SSLv3, TLS 1.0, 1.1 are insecure)
#     - Strong cipher suite (forward secrecy with ECDHE)
#     - HSTS header (once a browser visits over HTTPS it refuses HTTP)
#
#  4. Security headers (belt-and-suspenders on top of FastAPI middleware):
#     - X-Frame-Options, X-Content-Type-Options, Referrer-Policy
#
#  INSTALLATION STEPS (run on your Ubuntu VM):
#  ────────────────────────────────────────────
#  Step 1 — Install Nginx if not already present:
#    sudo apt update && sudo apt install nginx -y
#
#  Step 2 — Generate a self-signed TLS certificate:
#    sudo mkdir -p /etc/nginx/ssl
#    sudo openssl req -x509 -newkey rsa:4096 \
#         -keyout /etc/nginx/ssl/securejobs.key \
#         -out    /etc/nginx/ssl/securejobs.crt \
#         -days   365 -nodes \
#         -subj "/C=IN/ST=Delhi/L=Delhi/O=SecureJobs/CN=localhost"
#
#    What each flag means:
#      -x509          → self-signed (no CA needed for dev/demo)
#      -newkey rsa:4096 → generate a new RSA-4096 private key
#      -keyout        → where to write the private key
#      -out           → where to write the certificate
#      -days 365      → certificate valid for 1 year
#      -nodes         → no passphrase on the key (so Nginx can start unattended)
#      -subj          → certificate subject fields (CN=localhost for local dev)
#
#  Step 3 — Copy this file to Nginx config:
#    sudo cp nginx.conf /etc/nginx/sites-available/securejobs
#    sudo ln -s /etc/nginx/sites-available/securejobs \
#               /etc/nginx/sites-enabled/securejobs
#    sudo rm -f /etc/nginx/sites-enabled/default   # remove default site
#
#  Step 4 — Test and reload:
#    sudo nginx -t          # must print "syntax is ok"
#    sudo systemctl reload nginx
#
#  Step 5 — Start Uvicorn (HTTP only, bound to localhost):
#    uvicorn main:app --host 127.0.0.1 --port 8000
#    (Nginx handles TLS; Uvicorn never sees raw HTTPS traffic)
#
#  Step 6 — Open in browser:
#    https://localhost   or   https://<your-VM-IP>
#    (Accept the self-signed certificate warning in browser)
#
#  FIREWALL RULES (run after the above):
#    sudo ufw allow 443/tcp    # HTTPS
#    sudo ufw allow 80/tcp     # HTTP (redirects to HTTPS)
#    sudo ufw deny  8000/tcp   # Block direct Uvicorn access from outside
#    sudo ufw enable
# ─────────────────────────────────────────────────────────────


# ── Worker processes ──────────────────────────────────────────
# "auto" = one worker per CPU core.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/securejobs_access.log;
    error_log  /var/log/nginx/securejobs_error.log;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;

    # ── Hide Nginx version from attackers ────────────────────
    server_tokens off;

    # ── Gzip (compress responses) ─────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/html;

    # ══════════════════════════════════════════════════════════
    # SERVER BLOCK 1 — HTTP → HTTPS redirect
    # Every plain HTTP request gets a permanent 301 redirect.
    # Browsers that follow this redirect will switch to HTTPS.
    # After the HSTS header is set (below), future requests skip
    # HTTP entirely — the browser goes straight to HTTPS.
    # ══════════════════════════════════════════════════════════
    server {
        listen      80;
        server_name localhost;       # Replace with your domain if you have one

        # Redirect all HTTP traffic to HTTPS permanently
        return 301 https://$host$request_uri;
    }


    # ══════════════════════════════════════════════════════════
    # SERVER BLOCK 2 — HTTPS (TLS termination + reverse proxy)
    # ══════════════════════════════════════════════════════════
    server {
        listen      443 ssl;
        server_name localhost;       # Replace with your domain if you have one

        # ── TLS certificate files ─────────────────────────────
        ssl_certificate     /etc/nginx/ssl/securejobs.crt;
        ssl_certificate_key /etc/nginx/ssl/securejobs.key;

        # ── TLS protocol versions ─────────────────────────────
        # Only TLS 1.2 and 1.3 are considered secure.
        # TLS 1.0 and 1.1 are deprecated (POODLE, BEAST attacks).
        # SSLv3 is completely broken (POODLE).
        ssl_protocols TLSv1.2 TLSv1.3;

        # ── Cipher suites ─────────────────────────────────────
        # ECDHE = Elliptic Curve Diffie-Hellman Ephemeral.
        # "Ephemeral" means a new key is generated per session →
        # Perfect Forward Secrecy: past sessions stay safe even
        # if the server private key is later compromised.
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;   # TLS 1.3 handles this itself

        # ── Session resumption (performance) ──────────────────
        # Clients can resume a previous TLS session without a
        # full handshake, reducing latency.
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;   # tickets have forward-secrecy issues

        # ── DH parameters for older TLS 1.2 clients ──────────
        # Generate with: sudo openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
        # Then uncomment the line below:
        # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        # ── HSTS (HTTP Strict Transport Security) ─────────────
        # Once a browser receives this header, it will REFUSE
        # to connect over HTTP for 31536000 seconds (1 year).
        # This defeats SSL-stripping attacks.
        # WARNING: Only enable after you're sure HTTPS works,
        # or you can lock yourself out of the site.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Additional security headers ───────────────────────
        # Belt-and-suspenders: FastAPI also sets these, but
        # having them at the Nginx layer means they apply even
        # if FastAPI crashes and Nginx returns its own error page.
        add_header X-Frame-Options           "DENY"                          always;
        add_header X-Content-Type-Options    "nosniff"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Request size limit ────────────────────────────────
        # Limits upload size at the Nginx layer (before it reaches
        # Uvicorn). Our profile_routes.py also checks ≤ 5 MB server-side.
        client_max_body_size 6M;

        # ── Reverse proxy to Uvicorn ──────────────────────────
        # All requests that pass TLS go here. Nginx acts as a
        # "dumb pipe" — it forwards the request to Uvicorn and
        # returns Uvicorn's response.
        location / {
            proxy_pass         http://127.0.0.1:8000;

            # Tell FastAPI the real client IP (not Nginx's IP).
            # FastAPI's rate limiter (slowapi) uses this.
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Preserve the original Host header (needed for
            # CSRF validation and cookie domain checks).
            proxy_set_header   Host             $host;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
